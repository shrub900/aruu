# posix: POSIX 2024
PRESET_FEATURES=all

# subset of: posix linux net xsi pseudo dev
PRESET_UTILS="posix linux net xsi pseudo"

# installation paths
VERSION=2026-06-08T05-53-UTC-03
PREFIX=/usr/local
MANPREFIX=/usr/local/share/man

# toolchain
CC=cc
CFLAGS="-std=c99 -Wall -Wextra -pedantic"
LDFLAGS=""
LDLIBS="-lcrypt -lresolv"
AR=ar
ARFLAGS="rc"
RANLIB=ranlib

# --- preset expansion: do not edit below ---

case "$PRESET_FEATURES" in
posix)
    FEATURE_FIND_DELETE=0;            FEATURE_FIND_QUIT=0
    FEATURE_FIND_EMPTY=0;             FEATURE_FIND_INUM=0
    FEATURE_FIND_SAMEFILE=0;          FEATURE_FIND_MAXDEPTH=0
    FEATURE_FIND_MINDEPTH=0;          FEATURE_FIND_MMIN=0
    FEATURE_FIND_AMIN=0;              FEATURE_FIND_CMIN=0
    FEATURE_FIND_INAME=0;             FEATURE_FIND_IPATH=0
    FEATURE_FIND_REGEX=0;             FEATURE_FIND_PRINT0=0
    FEATURE_SED_INPLACE=0;            FEATURE_SED_PRESERVE_NEWLINE=0
    FEATURE_GREP_CONTEXT=0;           FEATURE_GREP_MAX_COUNT=0
    FEATURE_TAR_CREATE=0;             FEATURE_TAR_EXCLUDE=0
    FEATURE_STAT_FILESYSTEM=0;        FEATURE_STAT_FORMAT=0
    FEATURE_SORT_BIG=0;               FEATURE_SORT_STABLE=0
    FEATURE_OD_ENDIAN=0;
    FEATURE_SH_HISTEDIT=0;            FEATURE_SH_LOCAL=0
    FEATURE_SH_LET=0;                 FEATURE_SH_ULIMIT=0
    FEATURE_SH_SETVAR=0;              FEATURE_SH_WORDEXP=0
    FEATURE_CAL_EXT=0
    FEATURE_LS_COLOR=0
    FEATURE_MODPROBE_SHOW_DEPENDS=0;  FEATURE_MODPROBE_BLACKLIST=0
    FEATURE_MODPROBE_SYSLOG=0;        FEATURE_MODPROBE_DIR_OVERRIDE=0
    FEATURE_DEPMOD_ALIAS=0;           FEATURE_DEPMOD_SYMBOLS=0
    FEATURE_TAR_TTY_SAFE=0;           FEATURE_TAR_NOFOLLOW=0
    FEATURE_READLINK_REALPATH=0;      FEATURE_UMOUNT_OPTIONS=0
    FEATURE_TAR_TO_STDOUT=0;          FEATURE_TAR_KEEP_OLD=0
    FEATURE_TAR_STRIP_COMPONENTS=0;   FEATURE_TAR_FILES_FROM=0
    FEATURE_TAR_EXCLUDE_FROM=0;       FEATURE_IP_ROUTE_ADD_DEL=0
    FEATURE_IP_LINK_SET=0;            FEATURE_IP_ADDR_FLUSH=0
    ;;
common)
    FEATURE_FIND_DELETE=1;            FEATURE_FIND_QUIT=1
    FEATURE_FIND_EMPTY=1;             FEATURE_FIND_INUM=1
    FEATURE_FIND_SAMEFILE=1;          FEATURE_FIND_MAXDEPTH=1
    FEATURE_FIND_MINDEPTH=1;          FEATURE_FIND_MMIN=1
    FEATURE_FIND_AMIN=1;              FEATURE_FIND_CMIN=1
    FEATURE_FIND_INAME=1;             FEATURE_FIND_IPATH=1
    FEATURE_FIND_REGEX=1;             FEATURE_FIND_PRINT0=1
    FEATURE_SED_INPLACE=1;            FEATURE_SED_PRESERVE_NEWLINE=1
    FEATURE_GREP_CONTEXT=1;           FEATURE_GREP_MAX_COUNT=1
    FEATURE_TAR_CREATE=1;             FEATURE_TAR_EXCLUDE=1
    FEATURE_STAT_FILESYSTEM=1;        FEATURE_STAT_FORMAT=1
    FEATURE_SORT_BIG=0;               FEATURE_SORT_STABLE=1
    FEATURE_OD_ENDIAN=0;
    FEATURE_SH_HISTEDIT=0;            FEATURE_SH_LOCAL=1
    FEATURE_SH_LET=1;                 FEATURE_SH_ULIMIT=1
    FEATURE_SH_SETVAR=0;              FEATURE_SH_WORDEXP=0
    FEATURE_CAL_EXT=1
    FEATURE_LS_COLOR=1
    FEATURE_MODPROBE_SHOW_DEPENDS=1;  FEATURE_MODPROBE_BLACKLIST=1
    FEATURE_MODPROBE_SYSLOG=1;        FEATURE_MODPROBE_DIR_OVERRIDE=1
    FEATURE_DEPMOD_ALIAS=1;           FEATURE_DEPMOD_SYMBOLS=1
    FEATURE_TAR_TTY_SAFE=1;           FEATURE_TAR_NOFOLLOW=1
    FEATURE_READLINK_REALPATH=1;      FEATURE_UMOUNT_OPTIONS=1
    FEATURE_TAR_TO_STDOUT=1;          FEATURE_TAR_KEEP_OLD=1
    FEATURE_TAR_STRIP_COMPONENTS=1;   FEATURE_TAR_FILES_FROM=1
    FEATURE_TAR_EXCLUDE_FROM=1;       FEATURE_IP_ROUTE_ADD_DEL=1
    FEATURE_IP_LINK_SET=1;            FEATURE_IP_ADDR_FLUSH=1
    ;;
all)
    # histedit now included via redline
    FEATURE_FIND_DELETE=1;            FEATURE_FIND_QUIT=1
    FEATURE_FIND_EMPTY=1;             FEATURE_FIND_INUM=1
    FEATURE_FIND_SAMEFILE=1;          FEATURE_FIND_MAXDEPTH=1
    FEATURE_FIND_MINDEPTH=1;          FEATURE_FIND_MMIN=1
    FEATURE_FIND_AMIN=1;              FEATURE_FIND_CMIN=1
    FEATURE_FIND_INAME=1;             FEATURE_FIND_IPATH=1
    FEATURE_FIND_REGEX=1;             FEATURE_FIND_PRINT0=1
    FEATURE_SED_INPLACE=1;            FEATURE_SED_PRESERVE_NEWLINE=1
    FEATURE_GREP_CONTEXT=1;           FEATURE_GREP_MAX_COUNT=1
    FEATURE_TAR_CREATE=1;             FEATURE_TAR_EXCLUDE=1
    FEATURE_STAT_FILESYSTEM=1;        FEATURE_STAT_FORMAT=1
    FEATURE_SORT_BIG=1;               FEATURE_SORT_STABLE=1
    FEATURE_OD_ENDIAN=1;
    FEATURE_SH_HISTEDIT=1;            FEATURE_SH_LOCAL=1
    FEATURE_SH_LET=1;                 FEATURE_SH_ULIMIT=1
    FEATURE_SH_SETVAR=1;              FEATURE_SH_WORDEXP=1
    FEATURE_CAL_EXT=1
    FEATURE_LS_COLOR=1
    FEATURE_MODPROBE_SHOW_DEPENDS=1;  FEATURE_MODPROBE_BLACKLIST=1
    FEATURE_MODPROBE_SYSLOG=1;        FEATURE_MODPROBE_DIR_OVERRIDE=1
    FEATURE_DEPMOD_ALIAS=1;           FEATURE_DEPMOD_SYMBOLS=1
    FEATURE_TAR_TTY_SAFE=1;           FEATURE_TAR_NOFOLLOW=1
    FEATURE_READLINK_REALPATH=1;      FEATURE_UMOUNT_OPTIONS=1
    FEATURE_TAR_TO_STDOUT=1;          FEATURE_TAR_KEEP_OLD=1
    FEATURE_TAR_STRIP_COMPONENTS=1;   FEATURE_TAR_FILES_FROM=1
    FEATURE_TAR_EXCLUDE_FROM=1;       FEATURE_IP_ROUTE_ADD_DEL=1
    FEATURE_IP_LINK_SET=1;            FEATURE_IP_ADDR_FLUSH=1
    ;;
*)
    printf 'build.cfg: unknown PRESET_FEATURES value: %s\n' "$PRESET_FEATURES" >&2
    return 1 2>/dev/null || exit 1
    ;;
esac

BUILD_POSIX=0; BUILD_LINUX=0; BUILD_NET=0; BUILD_XSI=0
BUILD_PSEUDO=0; BUILD_DEV=0
for _p in $PRESET_UTILS; do
    case "$_p" in
        posix)  BUILD_POSIX=1  ;;
        linux)  BUILD_LINUX=1  ;;
        net)    BUILD_NET=1    ;;
        xsi)    BUILD_XSI=1    ;;
        pseudo) BUILD_PSEUDO=1 ;;
        dev)    BUILD_DEV=1    ;;
        *)
            printf 'build.cfg: unknown util preset: %s\n' "$_p" >&2
            return 1 2>/dev/null || exit 1
            ;;
    esac
done
unset _p

# --- per-item overrides (after preset expansion) ---
# BUILD_POSIX_SH=0       # disable a tool when its group is active
# BUILD_DEV_AS=1         # enable a tool whose group isnt in PRESET_UTILS
FEATURE_SH_HISTEDIT=1
# tls backend: set exactly one to 1 to enable tls
FEATURE_USE_BEARSSL=0
FEATURE_USE_LIBRESSL=0
FEATURE_USE_OPENSSL=0
FEATURE_USE_SSL=1

if [ "$FEATURE_USE_SSL" = 1 ]; then
    if [ "$FEATURE_USE_BEARSSL" = 0 ] && [ "$FEATURE_USE_LIBRESSL" = 0 ] && [ "$FEATURE_USE_OPENSSL" = 0 ]; then
        if pkg-config --exists libbearssl 2>/dev/null || pkg-config --exists bearssl 2>/dev/null; then
            FEATURE_USE_BEARSSL=1
        elif pkg-config --exists libtls 2>/dev/null; then
            FEATURE_USE_LIBRESSL=1
        elif pkg-config --exists openssl 2>/dev/null; then
            FEATURE_USE_OPENSSL=1
        fi
    fi
fi
